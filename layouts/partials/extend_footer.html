{{- /* 扩展 footer —— 交互增强脚本 */ -}}

<!-- 阅读进度条 -->
<div class="reading-progress-bar" id="reading-progress"></div>

<script>
(function () {
  // ── 阅读进度条 ──
  var bar = document.getElementById('reading-progress');
  if (bar) {
    window.addEventListener('scroll', function () {
      var dh = document.documentElement.scrollHeight - window.innerHeight;
      var pct = dh > 0 ? (window.scrollY / dh) * 100 : 100;
      bar.style.width = pct + '%';
    }, { passive: true });
  }

  document.addEventListener('DOMContentLoaded', function () {
    // ── 外部链接新标签打开 ──
    document.querySelectorAll('a[href^="http"]').forEach(function (link) {
      if (link.hostname !== window.location.hostname) {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    });

    // ── 代码复制按钮汉化 ──
    var observer = new MutationObserver(function () {
      document.querySelectorAll('.copy-code:not([data-localized])').forEach(function (btn) {
        btn.setAttribute('data-localized', '1');
        btn.addEventListener('click', function () {
          var self = this;
          var orig = self.innerText;
          self.innerText = '✓ 已复制';
          setTimeout(function () { self.innerText = orig; }, 2000);
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // ── 图片点击灯箱（简易版：新标签打开） ──
    document.querySelectorAll('.post-content img').forEach(function (img) {
      img.addEventListener('click', function () {
        window.open(this.src, '_blank', 'noopener');
      });
    });
  });
}());
</script>

<style>
#top-link {
  transition: all 0.3s ease;
  border-radius: 10px;
}
#top-link:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
}
</style>

# Hugo 配置文件

baseURL = "https://Pan-Binghong.github.io/daily-learning/"
languageCode = "zh-CN"
title = "Pan Binghong's Tech Blog"
theme = "PaperMod"

# 内容目录
contentDir = "content"
publishDir = "public"

# 启用 Emoji
enableEmoji = true

# 启用 Git 信息
enableGitInfo = true

# 分页配置（Hugo v0.128.0+ 新语法）
[pagination]
  pagerSize = 10

# 忽略警告日志
ignoreLogs = ['warning-goldmark-raw-html']

# Markdown 渲染配置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # 允许渲染原始 HTML
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 导航菜单
[menu]
  [[menu.main]]
    name = "🏠 首页"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "🤖 AI"
    url = "/ai/"
    weight = 2

  [[menu.main]]
    name = "📚 知识库"
    url = "/knowledge/"
    weight = 3

  [[menu.main]]
    name = "⚙️ 后端"
    url = "/backend/"
    weight = 4

  [[menu.main]]
    name = "🔧 DevOps"
    url = "/devops/"
    weight = 5

  [[menu.main]]
    name = "📝 其他"
    url = "/other/"
    weight = 6

  [[menu.main]]
    name = "🔍 搜索"
    url = "/search/"
    weight = 7

  [[menu.main]]
    name = "🏷️ 标签"
    url = "/tags/"
    weight = 8

  [[menu.main]]
    name = "📂 归档"
    url = "/archives/"
    weight = 9

  [[menu.main]]
    name = "👤 关于"
    url = "/about/"
    weight = 10

# PaperMod 主题参数
[params]
  env = "production"
  description = "记录技术成长的每一步 - AI、后端、DevOps 学习笔记"
  author = "Pan Binghong"

  # 主页模式 - 使用 profile 模式展示个人信息
  mainSections = ["ai", "backend", "devops", "knowledge", "other"]

  # 默认主题（light/dark/auto）
  defaultTheme = "auto"

  # 显示阅读时间
  ShowReadingTime = true

  # 显示文章字数
  ShowWordCount = true

  # 显示分享按钮
  ShowShareButtons = true

  # 显示文章导航（上一篇/下一篇）
  ShowPostNavLinks = true

  # 显示面包屑导航
  ShowBreadCrumbs = true

  # 显示代码复制按钮
  ShowCodeCopyButtons = true

  # 显示目录
  ShowToc = true
  TocOpen = false

  # 显示编辑建议按钮
  ShowRssButtonInSectionTermList = true

  # 启用 Giscus 评论系统（基于 GitHub Discussions）
  comments = true

  # Profile 模式配置（专业首页）
  [params.profileMode]
    enabled = true
    title = "Pan Binghong"
    subtitle = "全栈开发者 | AI 爱好者 | 终身学习者"
    imageUrl = "https://avatars.githubusercontent.com/Pan-Binghong"
    imageWidth = 150
    imageHeight = 150
    imageTitle = "Pan Binghong"

    [[params.profileMode.buttons]]
      name = "📚 浏览文章"
      url = "/archives/"

    [[params.profileMode.buttons]]
      name = "🏷️ 查看标签"
      url = "/tags/"

    [[params.profileMode.buttons]]
      name = "⭐ GitHub"
      url = "https://github.com/Pan-Binghong"

    [[params.profileMode.buttons]]
      name = "💬 留言讨论"
      url = "https://github.com/Pan-Binghong/daily-learning/discussions"

  # 社交链接图标
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Pan-Binghong"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:19909442097@163.com"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  # Giscus 评论系统配置（基于 GitHub Discussions）
  [params.giscus]
    repo = "Pan-Binghong/daily-learning"
    repoID = "R_kgDOQOK4Vw"
    category = "Announcements"
    categoryID = "DIC_kwDOQOK4V84CxfA9"
    mapping = "pathname"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    theme = "preferred_color_scheme"
    lang = "zh-CN"
    loading = "lazy"

  # 搜索配置
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 隐私设置
[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    disable = false
    respectDoNotTrack = true
  [privacy.x]
    enableDNT = true
  [privacy.youtube]
    privacyEnhanced = true

# Hugo 配置文件 - Stack 主题

baseURL = "https://Pan-Binghong.github.io/daily-learning/"
languageCode = "zh-CN"
title = "Pan Binghong's Tech Blog"
theme = "stack"

# 内容目录
contentDir = "content"
publishDir = "public"

# 启用 Emoji
enableEmoji = true

# 启用 Git 信息
enableGitInfo = true

# 分页配置
[pagination]
  pagerSize = 10

# 忽略警告日志
ignoreLogs = ['warning-goldmark-raw-html']

# Markdown 渲染配置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 默认语言
DefaultContentLanguage = "zh-cn"

[languages]
  [languages.zh-cn]
    languageName = "中文"
    weight = 1

# 菜单配置
[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
    [menu.main.params]
      icon = "home"

  [[menu.main]]
    identifier = "ai"
    name = "AI"
    url = "/ai/"
    weight = 2
    [menu.main.params]
      icon = "cpu"

  [[menu.main]]
    identifier = "knowledge"
    name = "知识库"
    url = "/knowledge/"
    weight = 3
    [menu.main.params]
      icon = "book"

  [[menu.main]]
    identifier = "backend"
    name = "后端"
    url = "/backend/"
    weight = 4
    [menu.main.params]
      icon = "server"

  [[menu.main]]
    identifier = "devops"
    name = "DevOps"
    url = "/devops/"
    weight = 5
    [menu.main.params]
      icon = "tool"

  [[menu.main]]
    identifier = "other"
    name = "其他"
    url = "/other/"
    weight = 6
    [menu.main.params]
      icon = "folder"

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 7
    [menu.main.params]
      icon = "archive"

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 8
    [menu.main.params]
      icon = "search"

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 9
    [menu.main.params]
      icon = "user"

# 参数配置
[params]
  # 主要文章分类
  mainSections = ["ai", "backend", "devops", "knowledge", "other"]

  # 日期格式
  dateFormat = "2006-01-02"

  # 文章展示配置
  [params.article]
    showReadingTime = true
    showWordCount = true
    showTableOfContents = true
    showTaxonomies = true
    showComments = true

  # 侧边栏配置
  [params.sidebar]
    emoji = "🚀"
    subtitle = "全栈开发者 | AI 爱好者 | 终身学习者"
    
    [params.sidebar.avatar]
      enabled = true
      local = false
      src = "https://avatars.githubusercontent.com/Pan-Binghong"

  # 主页配置
  [params.home]
    showRecent = true
    recentLimit = 10

  # 搜索配置
  [params.search]
    enable = true
    type = "fuse"

  # 评论配置
  [params.comments]
    enabled = true
    provider = "giscus"
    
    [params.comments.giscus]
      repo = "Pan-Binghong/daily-learning"
      repoID = "R_kgDOQOK4Vw"
      category = "Announcements"
      categoryID = "DIC_kwDOQOK4V84CxfA9"
      mapping = "title"
      reactionsEnabled = "1"
      emitMetadata = "0"
      inputPosition = "bottom"
      theme = "preferred_color_scheme"
      lang = "zh-CN"
      loading = "lazy"

  # 分享按钮
  [params.shareButtons]
    enabled = ["linkedin", "twitter"]

  # 颜色主题
  [params.colorScheme]
    toggle = true
    default = "auto"

  # 小部件配置
  [params.widgets]
    [params.widgets.homepage]
      type = ["search", "archives", "categories", "tag-cloud"]
    [params.widgets.page]
      type = ["toc"]

# 分类和标签配置
[taxonomies]
  tag = "tags"
  category = "categories"

# 相关文章
[related]
  includeNewer = true
  threshold = 60
  toLower = true
  
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80

# 隐私设置
[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    disable = false
    respectDoNotTrack = true

# 自定义页脚（覆盖主题默认）
[params.footer]
  since = 2026
  customText = "使用 Hugo & Stack 主题构建"

# Hugo 配置文件 - Stack 主题

baseURL = "https://Pan-Binghong.github.io/daily-learning/"
languageCode = "zh-CN"
title = "Pan Binghong's Tech Blog"
theme = "stack"

# 内容目录
contentDir = "content"
publishDir = "public"

# 启用 Emoji
enableEmoji = true

# 启用 Git 信息
enableGitInfo = true

# 分页配置
[pagination]
  pagerSize = 10

# 忽略警告日志
ignoreLogs = ['warning-goldmark-raw-html']

# Markdown 渲染配置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Stack 主题参数
[params]
  # 主页配置
  mainSections = ["ai", "backend", "devops", "knowledge", "other"]
  
  # 文章配置
  dateFormat = "2006-01-02"
  showReadingTime = true
  showWordCount = true
  showTableOfContents = true
  showTaxonomies = true
  showComments = true

  # 侧边栏配置
  [params.sidebar]
    emoji = "🚀"
    subtitle = "全栈开发者 | AI 爱好者 | 终身学习者"
    
    [params.sidebar.avatar]
      enabled = true
      local = false
      src = "https://avatars.githubusercontent.com/Pan-Binghong"

  # 社交链接
  [[params.sidebar.links]]
    title = "GitHub"
    icon = "github"
    url = "https://github.com/Pan-Binghong"
    
  [[params.sidebar.links]]
    title = "Email"
    icon = "mail"
    url = "mailto:19909442097@163.com"

  # 文章元信息
  [params.article]
    showReadingTime = true
    showWordCount = true
    showTableOfContents = true
    showTaxonomies = true
    showComments = true

  # 小部件配置
  [params.widgets]
    enabled = ["search", "archives", "categories", "tags"]
    
    [params.widgets.archives]
      limit = 5
      
    [params.widgets.tags]
      enabled = true

  # 评论系统 (Giscus)
  [params.comments]
    enabled = true
    provider = "giscus"
    
    [params.comments.giscus]
      repo = "Pan-Binghong/daily-learning"
      repoID = "R_kgDOQOK4Vw"
      category = "Announcements"
      categoryID = "DIC_kwDOQOK4V84CxfA9"
      mapping = "title"
      reactionsEnabled = "1"
      emitMetadata = "0"
      inputPosition = "bottom"
      theme = "preferred_color_scheme"
      lang = "zh-CN"
      loading = "lazy"

  # SEO 配置
  [params.seo]
    description = "记录技术成长的每一步 - AI、后端、DevOps 学习笔记"
    keywords = ["AI", "后端开发", "DevOps", "技术博客", "学习笔记"]

  # 页面配置
  [params.defaultImage]
    enabled = false

  # 颜色主题
  [params.colorScheme]
    toggle = true
    default = "auto"

# 导航菜单
[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
    [menu.main.params]
      icon = "home"
      
  [[menu.main]]
    name = "AI"
    url = "/ai/"
    weight = 2
    [menu.main.params]
      icon = "cpu"
      
  [[menu.main]]
    name = "知识库"
    url = "/knowledge/"
    weight = 3
    [menu.main.params]
      icon = "book"
      
  [[menu.main]]
    name = "后端"
    url = "/backend/"
    weight = 4
    [menu.main.params]
      icon = "server"
      
  [[menu.main]]
    name = "DevOps"
    url = "/devops/"
    weight = 5
    [menu.main.params]
      icon = "settings"
      
  [[menu.main]]
    name = "其他"
    url = "/other/"
    weight = 6
    [menu.main.params]
      icon = "folder"
      
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 7
    [menu.main.params]
      icon = "archive"
      
  [[menu.main]]
    name = "搜索"
    url = "/search/"
    weight = 8
    [menu.main.params]
      icon = "search"

  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 9
    [menu.main.params]
      icon = "user"

# 相关文章配置
[related]
  includeNewer = true
  threshold = 60
  toLower = true
  
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

# 隐私设置
[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
    disable = false
    respectDoNotTrack = true

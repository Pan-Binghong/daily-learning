name: Notion 同步与 Hugo 部署

# 并发控制：同一分支只允许一个部署在运行，后来的排队等候
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00 每天执行
  workflow_dispatch:        # 支持手动触发
  push:
    branches: [master, main]
    paths:
      - 'notion-config.yml'
      - 'notion-sync.py'
      - 'config.toml'
      - 'layouts/**'        # 模板变更触发重新部署
      - 'assets/**'         # CSS/JS 变更触发重新部署
      - 'content/**'        # 手动修改内容也触发部署

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 📦 检出代码（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📚 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 📥 从 Notion 同步内容
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python notion-sync.py

      - name: 📝 提交 Notion 同步内容
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          if [ -n "$(git status --porcelain content/)" ]; then
            git add content/
            git commit -m "sync: Notion content $(date -u +'%Y-%m-%d')"
            git push origin HEAD
            echo "✅ 内容已提交并推送"
          else
            echo "ℹ️  Notion 无内容变更，跳过提交"
          fi

      - name: 🗂️ 缓存 Hugo 生成资源
        uses: actions/cache@v4
        with:
          path: resources/_gen
          key: ${{ runner.os }}-hugo-gen-${{ hashFiles('config.toml', 'assets/**') }}
          restore-keys: ${{ runner.os }}-hugo-gen-

      - name: 🏗️ 安装 Hugo Extended
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.147.0'   # 固定版本，满足 PaperMod >= 0.146.0 要求
          extended: true

      - name: 🔨 构建 Hugo 站点
        run: hugo --minify --gc
        env:
          TZ: Asia/Shanghai   # 确保文章时间显示正确

      - name: 📤 部署到 GitHub Pages（gh-pages 分支）
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: "deploy: ${{ github.sha }}"

      - name: ✅ 部署完成
        run: |
          echo "✨ 部署完成"
          echo "Hugo: $(hugo version | grep -oP 'v[\d.]+')"
          echo "时间: $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S %Z')"
